analyze_inquiry_task:
  description: >
    Analyze the following customer inquiry for a small service-based cleaning business:

    {customer_inquiry}

    Extract the requested service type, job scope, preferred timing, urgency,
    requested extras or special requirements, customer email if present, and any
    missing information needed for later business decisions.

    If a customer email is present in the inquiry, use the Customer History Tool
    to look up whether this is a repeat customer. If a record exists, review their
    past services, preferred schedule, common requests, and communication style.
    Use this history to enrich the inquiry analysis — flag whether this is a repeat
    customer, note any preferences that are relevant to the current request, and
    identify any past add-ons or habits that could inform the quote (for example,
    a customer who regularly adds an oven clean, or who prefers morning slots).
    Include this as customer context in the structured output so downstream agents
    can act on it.
  expected_output: >
    A structured inquiry analysis containing:
    - service type
    - job scope
    - preferred schedule
    - requested extras
    - urgency
    - customer email
    - missing information
    - service match status
    - matched service
    - match confidence
    - unmatched elements
    - clarification needed
    - repeat customer flag (true/false)
    - relevant past preferences and history (if repeat customer)
  agent: inquiry_analyst_agent

readiness_check_task:
  description: >
    Using the structured inquiry analysis, determine whether the business is
    operationally ready to take the requested job.

    Evaluate staffing availability, resource availability, tools, equipment,
    inventory or materials, and scheduling constraints. Identify any shortages,
    risks, or operational issues that may affect feasibility or internal cost.
  context:
    - analyze_inquiry_task
  expected_output: >
    A structured readiness report containing:
    - staffing status
    - resource/material status
    - tool/equipment status
    - scheduling feasibility
    - readiness risks
    - cost-impact notes
    - overall readiness result
  agent: readiness_check_agent

costing_task:
  description: >
    Using the inquiry analysis and readiness report, calculate the internal cost
    to the business for completing the requested service job.

    Include labor cost, material or inventory usage cost, equipment-related
    operational cost, and any additional burdens such as overtime, shortages,
    expedited handling, or special resource requirements.
  context:
    - analyze_inquiry_task
    - readiness_check_task
  expected_output: >
    A structured internal cost estimate containing:
    - labor cost
    - materials/resources cost
    - equipment operational cost
    - additional burden cost
    - total internal cost
    - main cost drivers
  agent: costing_agent

pricing_task:
  description: >
    Using the inquiry analysis, readiness findings, and internal cost estimate,
    generate the customer-facing quote.

    Determine the base customer price, add charges for extras or special service
    requirements, apply pricing rules or markups, include approved buffers or
    adjustments, and produce the final quoted price.
  context:
    - analyze_inquiry_task
    - readiness_check_task
    - costing_task
  expected_output: >
    A structured pricing result containing:
    - base customer price
    - extras/add-ons price total
    - business adjustments
    - final quoted price
    - pricing rationale
  agent: pricing_agent

profit_optimization_task:
  description: >
    Review the internal cost estimate and customer-facing quote to determine
    whether the proposed job is financially attractive for the business.

    Assess margin and profitability, then recommend whether the job should be
    accepted, revised, upsold, escalated, or declined.
  context:
    - costing_task
    - pricing_task
  expected_output: >
    A structured business recommendation containing:
    - recommendation status
    - profitability assessment
    - margin commentary
    - suggested action
    - rationale
  agent: profit_optimization_agent

draft_client_response_task:
  description: >
    Draft a professional customer-facing quote response using the inquiry analysis,
    pricing result, and business recommendation.

    Include the service summary, estimated quote, and any clarifying questions,
    assumptions, or conditions needed before final confirmation.

    If the inquiry analysis identified this as a repeat customer with known history,
    use the Customer History Tool to retrieve their full record and personalise the
    response accordingly. Match the communication style noted in their history
    (e.g. concise, detailed, friendly). Reference their past services naturally
    where relevant — for example, acknowledging their regular booking or noting
    that they previously included a particular add-on. If their history suggests
    preferences or add-ons they have used before but have not requested this time,
    offer them as relevant suggestions — keep this brief and non-pushy, one or two
    lines at most. Do not invent preferences not present in the customer record.
  context:
    - analyze_inquiry_task
    - pricing_task
    - profit_optimization_task
  expected_output: >
    A polished, personalised customer-facing quote response draft that reflects
    the customer's communication style and surfaces relevant past preferences
    where applicable.
  agent: client_response_agent

send_quote_email_task:
  description: >
    Human approval status: {human_approved}

    Customer email: {customer_email}

    Approved draft email content:
    {draft_email_content}

    A human operator has reviewed the quote above.
    If human_approved is true, the draft has been approved for delivery — confirm
    dispatch and return a delivery status message.
    If human_approved is false, the quote was rejected by the operator — do not
    send anything and return a status showing that delivery was blocked.
  expected_output: >
    A structured delivery status indicating whether the quote email was sent or blocked.
  agent: email_agent